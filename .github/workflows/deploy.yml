name: Deploy to GitHub Pages

# Запасной деплой на GitHub Pages. Основной хостинг — Timeweb App Platform,
# поэтому workflow запускается только вручную (Actions → этот workflow → Run),
# чтобы не падать на каждом push, если Pages не включён.
# Собранный web/dist портативен (base: "./" + hash-роутер).

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Не отменяем уже идущий прод-деплой, чтобы страница не осталась полупустой.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
